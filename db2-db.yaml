apiVersion: v1
kind: PersistentVolume
metadata:
  name: db2-pv
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain

  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - node03amd

  hostPath:
    path: /mnt/db2-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db2-pvc
  namespace: mydb2app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db2-db
  namespace: mydb2app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db2
  template:
    metadata:
      labels:
        app: db2
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64

      containers:
        - name: db2
          image: ibmcom/db2:latest
          ports:
            - containerPort: 50000

          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN

          env:
            - name: LICENSE
              value: accept
            - name: DB2INST1_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db2-secret
                  key: DB2INST1_PASSWORD

          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "4Gi"
              cpu: "2"

          volumeMounts:
            - name: db2data
              mountPath: /database

          readinessProbe:
            tcpSocket:
              port: 50000
            initialDelaySeconds: 90
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 50000
            initialDelaySeconds: 120
            periodSeconds: 20

      volumes:
        - name: db2data
          persistentVolumeClaim:
            claimName: db2-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: db2-service
  namespace: mydb2app
spec:
  type: NodePort
  selector:
    app: db2
  ports:
    - port: 50000
      targetPort: 50000
      nodePort: 30000
