apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: mydb2app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      # Force pod to run on ARM64 node
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
      - name: frontend
        image: abhianand2015/db2-sp-frontend-git:latest
        ports:
        - containerPort: 80
        env:
        - name: VITE_API_BASE
          value: "http://192.168.1.12:30008/api/v1"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: mydb2app
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30007
  type: NodePort
